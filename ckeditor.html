<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>CKEditor 5 – Classic editor</title>
	<script src="https://cdn.ckeditor.com/ckeditor5/36.0.0/classic/ckeditor.js"></script>
</head>
<body>
	<h1>CKEditor 5 - cool, eh?</h1>
	<p>From <a href="https://opensource.com/article/23/4/website-text-editor-ckeditor">https://opensource.com/article/23/4/website-text-editor-ckeditor</a>.</p>
	<div id="editor">
		<p>This is some sample content for my new WYSIWYG editor.</p>
	</div>
	<script>
        ClassicEditor
		.create(document.querySelector('#editor'))
		.catch(error => {
			console.error(error);
		});
	</script>
</body>
</html>
