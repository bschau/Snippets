<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width">
	<title>Center</title>
	<style>
.wrap {
	width: 100%;
	height: 100%;
}

.self {
	position: absolute;
	height: 20%;
	width: 10%;
	top: 50%;
	left: 50%;
	translate-top: -50%;
	translate-left: -50%;
	transform: translate(-50%, -50%);
}
</style>
</head>
<body>
	<div class="wrap">
	<div class="self">
		<h1>A title</h1>
		<p>This is some body text.</p>
	</div>
	</div>
</body>
</html>
